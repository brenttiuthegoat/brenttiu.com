<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MAKE 24 — Vibe Code</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e8150e;
  --purple:#7c3aed;
  --blue:#2563eb;
  --nebula1:#0f0720;
  --nebula2:#130a2e;
  --glow-purple:rgba(124,58,237,0.4);
  --glow-blue:rgba(37,99,235,0.4);
  --glow-red:rgba(232,21,14,0.5);
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.08);
  --text:#f0eeff;
  --muted:rgba(240,238,255,0.45);
  --bebas:'Bebas Neue',sans-serif;
  --body:'Space Grotesk',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--nebula1);
  color:var(--text);
  font-family:var(--body);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* ── NEBULA BACKGROUND ── */
.nebula{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(124,58,237,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(37,99,235,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(232,21,14,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #0f0720 0%, #050210 100%);
}
.nebula::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 30% 50% at 70% 20%, rgba(124,58,237,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 50% 30% at 10% 80%, rgba(37,99,235,0.1) 0%, transparent 50%);
  animation:nebulaShift 12s ease-in-out infinite alternate;
}
@keyframes nebulaShift{
  0%{opacity:.6;transform:scale(1)}
  100%{opacity:1;transform:scale(1.05)}
}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite;
  animation-delay:var(--dl,0s);
}
@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(1)}
  50%{opacity:1;transform:scale(1.4)}
}

/* ── MAIN CONTAINER ── */
.container{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;gap:2rem;
  padding:2rem 1rem;
  width:100%;max-width:600px;
}

/* ── HEADER ── */
.header{text-align:center}
.game-title{
  font-family:var(--bebas);
  font-size:clamp(3.5rem,10vw,6rem);
  letter-spacing:.1em;
  line-height:.9;
  background:linear-gradient(135deg,#fff 0%,#c4b5fd 40%,#93c5fd 70%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(124,58,237,0.5));
}
.game-sub{
  font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);margin-top:.4rem;
}
.score-row{
  display:flex;gap:2rem;justify-content:center;margin-top:.8rem;
}
.score-item{text-align:center}
.score-val{font-family:var(--bebas);font-size:2rem;letter-spacing:.05em;color:#fff}
.score-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

/* ── CARDS ── */
.cards-row{
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
}
.card{
  width:90px;height:130px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(10px);
  user-select:none;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(37,99,235,0.08));
  opacity:0;transition:opacity .3s;
}
.card:hover::before{opacity:1}
.card.selected{
  border-color:rgba(124,58,237,0.8);
  box-shadow:0 0 20px var(--glow-purple),0 0 40px rgba(124,58,237,0.15),inset 0 0 20px rgba(124,58,237,0.1);
  transform:translateY(-8px) scale(1.05);
}
.card.selected::before{opacity:1}
.card.used{
  opacity:.35;
  transform:scale(0.95);
  cursor:default;
  border-color:rgba(255,255,255,0.05);
}
.card.dealing{
  animation:dealCard .4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes dealCard{
  from{opacity:0;transform:translateY(-60px) scale(0.8) rotate(var(--rot,-5deg))}
  to{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
.card.win-flash{
  animation:winFlash .5s ease forwards;
}
@keyframes winFlash{
  0%,100%{box-shadow:0 0 20px var(--glow-red)}
  50%{box-shadow:0 0 60px var(--glow-red),0 0 100px rgba(232,21,14,0.3)}
}
.card-suit{
  position:absolute;top:8px;left:10px;
  font-size:.9rem;opacity:.6;
}
.card-suit-br{
  position:absolute;bottom:8px;right:10px;
  font-size:.9rem;opacity:.6;transform:rotate(180deg);
}
.card-num{
  font-family:var(--bebas);
  font-size:2.8rem;letter-spacing:.02em;
  line-height:1;
}
.card.red-suit .card-num{color:#ff6b8a}
.card.red-suit .card-suit,.card.red-suit .card-suit-br{color:#ff6b8a}
.card.black-suit .card-num{color:#e8eaf6}
.card.black-suit .card-suit,.card.black-suit .card-suit-br{color:#b0b8d1}

/* ── OPERATORS ── */
.ops-row{
  display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;
}
.op-btn{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--text);font-size:1.4rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(4px);
  font-family:var(--body);
}
.op-btn:hover{
  background:rgba(124,58,237,0.2);
  border-color:rgba(124,58,237,0.6);
  box-shadow:0 0 12px var(--glow-purple);
  transform:scale(1.1);
}
.op-btn.selected-op{
  background:rgba(124,58,237,0.35);
  border-color:rgba(124,58,237,0.9);
  box-shadow:0 0 16px var(--glow-purple);
  color:#fff;
}
.op-paren{
  width:40px;height:40px;font-size:1.1rem;border-radius:8px;
}

/* ── EXPRESSION DISPLAY ── */
.expr-display{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:1rem 1.5rem;
  text-align:center;
  backdrop-filter:blur(8px);
  min-height:64px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.expr-display::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,0.04),transparent);
  animation:scanline 3s linear infinite;
}
@keyframes scanline{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.expr-text{
  font-family:var(--bebas);
  font-size:1.8rem;letter-spacing:.06em;
  color:#fff;word-break:break-all;
  transition:all .2s;
}
.expr-text.empty{color:var(--muted);font-size:1rem;font-family:var(--body);letter-spacing:.1em;text-transform:uppercase}
.expr-result{
  position:absolute;bottom:6px;right:12px;
  font-size:.72rem;letter-spacing:.1em;color:var(--muted);
}
.expr-result.correct{color:#4ade80}
.expr-result.wrong{color:var(--red)}

/* ── ACTION BUTTONS ── */
.actions{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
.btn{
  font-family:var(--bebas);font-size:.95rem;letter-spacing:.1em;
  padding:.65rem 1.8rem;border:none;cursor:pointer;
  border-radius:8px;transition:all .2s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff;
  box-shadow:0 4px 20px rgba(124,58,237,0.3);
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(124,58,237,0.5);
}
.btn-secondary{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--muted);
}
.btn-secondary:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-danger{
  background:rgba(232,21,14,0.15);
  border:1px solid rgba(232,21,14,0.3);
  color:#ff6b8a;
}
.btn-danger:hover{background:rgba(232,21,14,0.25);box-shadow:0 0 12px var(--glow-red)}

/* ── MESSAGE ── */
.message{
  font-family:var(--bebas);font-size:1.8rem;letter-spacing:.1em;
  text-align:center;min-height:2.5rem;
  transition:all .3s;
}
.message.win{
  background:linear-gradient(135deg,#4ade80,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(74,222,128,0.5));
  animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1);
}
.message.lose{color:var(--red);filter:drop-shadow(0 0 10px var(--glow-red))}
.message.hint{color:rgba(196,181,253,0.8);font-size:1rem;font-family:var(--body);letter-spacing:.05em}
@keyframes popIn{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* ── HOW TO PLAY ── */
.how-to{
  font-size:.72rem;letter-spacing:.08em;color:var(--muted);
  text-align:center;line-height:1.8;
  max-width:380px;
}
.how-to strong{color:rgba(196,181,253,0.8)}

/* ── TIMER BAR ── */
.timer-bar-wrap{
  width:100%;max-width:420px;
  height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;
}
.timer-bar{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  transition:width .1s linear,background .5s;
  box-shadow:0 0 8px var(--glow-purple);
}
.timer-bar.urgent{background:linear-gradient(90deg,var(--red),#ff6b8a);box-shadow:0 0 8px var(--glow-red)}

/* mobile */
@media(max-width:480px){
  .card{width:72px;height:104px}
  .card-num{font-size:2.2rem}
  .container{gap:1.4rem;padding:1rem .8rem}
}
</style>
</head>
<body>

<div class="nebula"></div>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <div class="game-title">MAKE 24</div>
    <div class="game-sub">Use all 4 cards · Any order · Equals 24</div>
    <div class="score-row">
      <div class="score-item"><div class="score-val" id="scoreVal">0</div><div class="score-label">Score</div></div>
      <div class="score-item"><div class="score-val" id="streakVal">0</div><div class="score-label">Streak 🔥</div></div>
      <div class="score-item"><div class="score-val" id="timerVal">60</div><div class="score-label">Seconds</div></div>
    </div>
  </div>

  <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>

  <div class="cards-row" id="cardsRow"></div>

  <div class="ops-row">
    <button class="op-btn" onclick="selectOp('+')">+</button>
    <button class="op-btn" onclick="selectOp('-')">−</button>
    <button class="op-btn" onclick="selectOp('×')">×</button>
    <button class="op-btn" onclick="selectOp('÷')">÷</button>
    <button class="op-btn op-paren" onclick="addParen('(')">( )</button>
  </div>

  <div class="expr-display">
    <div class="expr-text empty" id="exprText">Select a card to start</div>
    <div class="expr-result" id="exprResult"></div>
  </div>

  <div class="message" id="message"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="checkAnswer()">Check →</button>
    <button class="btn btn-secondary" onclick="clearExpr()">Clear</button>
    <button class="btn btn-secondary" onclick="undoLast()">Undo</button>
    <button class="btn btn-danger" onclick="skipHand()">Skip</button>
    <button class="btn btn-secondary" onclick="showHint()">Hint</button>
  </div>

  <div class="how-to">
    <strong>How to play:</strong> Tap a card → tap an operator → tap another card.<br>
    Use all 4 numbers with + − × ÷ to reach exactly <strong>24</strong>.<br>
    You can use parentheses to change order of operations.
  </div>
</div>

<script>
// ── STARS ──
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const star=document.createElement('div');
    star.className='star';
    const size=Math.random()*2.5+0.5;
    star.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${Math.random()>0.7?'#c4b5fd':Math.random()>0.5?'#93c5fd':'#fff'};
      --d:${2+Math.random()*4}s;--dl:${-Math.random()*4}s;
      opacity:${Math.random()*0.5+0.1};
    `;
    s.appendChild(star);
  }
})();

// ── GAME STATE ──
const SUITS=['♠','♣','♥','♦'];
const RED_SUITS=['♥','♦'];
let cards=[];
let expr='';
let exprTokens=[];
let selectedCard=null;
let selectedOp=null;
let usedCards=[];
let score=0,streak=0;
let timerSecs=60,timerInt=null,gameActive=false;
let parenOpen=false;

// ── DEAL ──
function dealCards(){
  const row=document.getElementById('cardsRow');
  row.innerHTML='';
  cards=[];
  expr='';exprTokens=[];selectedCard=null;selectedOp=null;usedCards=[];parenOpen=false;
  document.getElementById('exprText').textContent='Select a card to start';
  document.getElementById('exprText').classList.add('empty');
  document.getElementById('exprResult').textContent='';
  document.getElementById('message').textContent='';
  document.getElementById('message').className='message';
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected-op'));

  for(let i=0;i<4;i++){
    const num=Math.floor(Math.random()*9)+2; // 2-10
    const suit=SUITS[Math.floor(Math.random()*4)];
    const isRed=RED_SUITS.includes(suit);
    cards.push({num,suit,isRed,used:false,id:i});

    const card=document.createElement('div');
    card.className=`card ${isRed?'red-suit':'black-suit'} dealing`;
    card.style.setProperty('--rot',`${(Math.random()-0.5)*10}deg`);
    card.style.animationDelay=`${i*0.08}s`;
    card.dataset.id=i;
    card.innerHTML=`
      <div class="card-suit">${suit}</div>
      <div class="card-num">${num}</div>
      <div class="card-suit-br">${suit}</div>
    `;
    card.addEventListener('click',()=>clickCard(i));
    row.appendChild(card);
  }

  if(!gameActive) startTimer();
}

// ── TIMER ──
function startTimer(){
  gameActive=true;
  timerSecs=60;
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timerSecs--;
    document.getElementById('timerVal').textContent=timerSecs;
    const pct=(timerSecs/60)*100;
    const bar=document.getElementById('timerBar');
    bar.style.width=pct+'%';
    if(timerSecs<=15){bar.classList.add('urgent');}else{bar.classList.remove('urgent');}
    if(timerSecs<=0){
      clearInterval(timerInt);
      gameActive=false;
      setMessage('TIME\'S UP!','lose');
      streak=0;
      document.getElementById('streakVal').textContent=0;
      setTimeout(()=>{timerSecs=60;dealCards();},2000);
    }
  },1000);
}

// ── CARD CLICK ──
function clickCard(id){
  if(cards[id].used)return;
  const cardEls=document.querySelectorAll('.card');

  if(selectedCard===id){
    // deselect
    cardEls[id].classList.remove('selected');
    selectedCard=null;
    return;
  }

  if(selectedCard===null && selectedOp===null){
    // first card
    selectedCard=id;
    cardEls[id].classList.add('selected');
    appendToken(cards[id].num,'num',id);
  } else if(selectedOp!==null && selectedCard===null){
    // second card after operator
    selectedCard=id;
    cardEls[id].classList.add('selected');
    appendToken(cards[id].num,'num',id);
    selectedOp=null;
    document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected-op'));
    selectedCard=null;
  } else if(selectedCard!==null){
    // switch selection
    cardEls[selectedCard].classList.remove('selected');
    selectedCard=id;
    cardEls[id].classList.add('selected');
  }
}

// ── OP SELECT ──
function selectOp(op){
  if(exprTokens.length===0)return;
  const lastToken=exprTokens[exprTokens.length-1];
  if(lastToken && lastToken.type==='op')return; // no double ops

  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected-op'));
  event.target.classList.add('selected-op');
  selectedOp=op;
  appendToken(op,'op',null);
  selectedCard=null;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
}

// ── PAREN ──
function addParen(p){
  if(parenOpen){
    appendToken(')','paren',null);
    parenOpen=false;
  } else {
    if(exprTokens.length===0||exprTokens[exprTokens.length-1].type==='op'){
      appendToken('(','paren',null);
      parenOpen=true;
    }
  }
}

// ── TOKEN MANAGEMENT ──
function appendToken(val,type,cardId){
  exprTokens.push({val,type,cardId});
  if(cardId!==null){
    cards[cardId].used=true;
    usedCards.push(cardId);
    document.querySelectorAll('.card')[cardId].classList.add('used');
    document.querySelectorAll('.card')[cardId].classList.remove('selected');
  }
  updateExprDisplay();
}

function updateExprDisplay(){
  const el=document.getElementById('exprText');
  const res=document.getElementById('exprResult');
  if(exprTokens.length===0){
    el.textContent='Select a card to start';
    el.classList.add('empty');
    res.textContent='';
    return;
  }
  el.classList.remove('empty');
  expr=exprTokens.map(t=>{
    if(t.val==='×')return '*';
    if(t.val==='÷')return '/';
    return t.val;
  }).join(' ');
  el.textContent=exprTokens.map(t=>t.val).join(' ');

  // Live eval
  try{
    const r=eval(expr);
    if(isFinite(r)){
      res.textContent='= '+parseFloat(r.toFixed(4));
      res.className='expr-result'+(r===24?' correct':'');
    }
  }catch(e){res.textContent=''}
}

// ── CHECK ──
function checkAnswer(){
  const numTokens=exprTokens.filter(t=>t.type==='num');
  if(numTokens.length!==4){setMessage('Use all 4 cards!','lose');return;}

  let result;
  try{result=eval(expr);}catch(e){setMessage('Invalid expression','lose');return;}

  if(Math.abs(result-24)<0.001){
    score+=10+streak*2;
    streak++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('streakVal').textContent=streak;
    setMessage('🎉 NICE! +' +(10+Math.max(0,(streak-1))*2), 'win');
    flashCards();
    timerSecs=Math.min(60,timerSecs+5);
    setTimeout(dealCards,1200);
  } else {
    setMessage('Not 24 — try again!','lose');
    streak=0;
    document.getElementById('streakVal').textContent=0;
  }
}

function flashCards(){
  document.querySelectorAll('.card').forEach(c=>{
    c.classList.add('win-flash');
    setTimeout(()=>c.classList.remove('win-flash'),500);
  });
}

// ── CLEAR / UNDO ──
function clearExpr(){
  exprTokens=[];usedCards=[];
  cards.forEach(c=>c.used=false);
  document.querySelectorAll('.card').forEach(c=>{c.classList.remove('used','selected')});
  selectedCard=null;selectedOp=null;parenOpen=false;
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected-op'));
  updateExprDisplay();
  setMessage('','');
}

function undoLast(){
  if(exprTokens.length===0)return;
  const last=exprTokens.pop();
  if(last.cardId!==null){
    cards[last.cardId].used=false;
    usedCards=usedCards.filter(id=>id!==last.cardId);
    document.querySelectorAll('.card')[last.cardId].classList.remove('used','selected');
  }
  if(last.type==='paren'&&last.val==='(')parenOpen=false;
  if(last.type==='paren'&&last.val===')')parenOpen=true;
  selectedOp=null;
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected-op'));
  updateExprDisplay();
}

// ── SKIP ──
function skipHand(){
  streak=0;
  document.getElementById('streakVal').textContent=0;
  setMessage('Skipped','');
  dealCards();
}

// ── HINT ──
function showHint(){
  const nums=cards.map(c=>c.num);
  const solution=solve24(nums);
  const el=document.getElementById('message');
  if(solution){
    el.textContent=solution;
    el.className='message hint';
  } else {
    el.textContent='No solution — try skipping!';
    el.className='message lose';
  }
}

// ── SOLVER (brute force) ──
function solve24(nums){
  const ops=['+','-','*','/'];
  const perms=permutations(nums);
  for(const perm of perms){
    for(const o1 of ops)for(const o2 of ops)for(const o3 of ops){
      const expressions=[
        `((${perm[0]}${o1}${perm[1]})${o2}${perm[2]})${o3}${perm[3]}`,
        `(${perm[0]}${o1}(${perm[1]}${o2}${perm[2]}))${o3}${perm[3]}`,
        `(${perm[0]}${o1}${perm[1]})${o2}(${perm[2]}${o3}${perm[3]})`,
        `${perm[0]}${o1}((${perm[1]}${o2}${perm[2]})${o3}${perm[3]})`,
        `${perm[0]}${o1}(${perm[1]}${o2}(${perm[2]}${o3}${perm[3]}))`,
      ];
      for(const ex of expressions){
        try{
          if(Math.abs(eval(ex)-24)<0.001){
            return ex.replace(/\*/g,'×').replace(/\//g,'÷');
          }
        }catch(e){}
      }
    }
  }
  return null;
}

function permutations(arr){
  if(arr.length<=1)return[arr];
  return arr.flatMap((v,i)=>permutations([...arr.slice(0,i),...arr.slice(i+1)]).map(p=>[v,...p]));
}

function setMessage(text,cls){
  const el=document.getElementById('message');
  el.textContent=text;
  el.className='message'+(cls?' '+cls:'');
}

dealCards();
